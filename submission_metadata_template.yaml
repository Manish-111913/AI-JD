ai_tools_used:
  - "Claude"
  - "ChatGPT"
  - "GitHub Copilot"

ai_usage_summary: |
  Used Claude for architecture design, backend and frontend specification,
  and documentation throughout development. Used ChatGPT for debugging and
  exploratory problem-solving. Used GitHub Copilot for inline autocomplete
  during implementation. No candidate data from candidates.jsonl was sent to
  any external LLM API during the ranking step -- all ranking logic
  (title filtering, bi-encoder scoring, cross-encoder re-ranking) runs
  locally with no network calls, per the competition's no-network constraint.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  RedroBRanker uses a three-stage neural retrieval pipeline. A title
  pre-filter eliminates ~69,000 irrelevant non-tech profiles instantly via
  lookup table. A bi-encoder (sentence-transformers all-MiniLM-L6-v2)
  computes semantic similarity between three targeted JD embedding queries
  and the ~31,000 remaining candidates, combined with a six-component
  composite score (skill trust, career quality, experience curve, location,
  education, behavioral signals) to shortlist the top 300. A local
  cross-encoder (ms-marco-MiniLM-L-6-v2) re-ranks these 300 candidate-JD
  pairs for deep relevance judgment, fully offline. Final score blends 40%
  composite with 60% cross-encoder output. A skill-trust formula combining
  proficiency, duration, endorsements, and platform assessment scores
  defeats keyword-stuffing; an evidence-accumulation honeypot detector flags
  impossible career timelines and proficiency claims. Behavioral signals
  apply smooth multiplicative penalties rather than hard cutoffs. Online
  runtime is under 90 seconds for the full 100K pool on CPU, with
  embeddings pre-computed offline.

