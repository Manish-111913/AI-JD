services:
  - type: web
    name: ai-jd-backend
    runtime: python
    region: oregon          # free-tier region; change to singapore/frankfurt if needed
    plan: free              # upgrade to starter/standard for no cold-start + persistent disk

    # ── Build ──────────────────────────────────────────────────────────────────
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt

    # ── Start ──────────────────────────────────────────────────────────────────
    startCommand: >
      uvicorn api:app
      --host 0.0.0.0
      --port $PORT
      --workers 1
      --timeout-keep-alive 120

    # ── Health check ───────────────────────────────────────────────────────────
    healthCheckPath: /

    # ── Environment Variables ──────────────────────────────────────────────────
    # All secrets should be added in the Render dashboard (Environment tab).
    # Only non-sensitive defaults are inlined here.
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"

      # API Mode (optional — system runs fully locally without these)
      - key: API_MODE_PROVIDER
        value: gemini                # gemini | openai

      - key: GEMINI_API_KEY
        sync: false                  # Set in Render dashboard — never commit keys

      - key: OPENAI_API_KEY
        sync: false                  # Set in Render dashboard — never commit keys

      # Model selection (defaults safe to commit)
      - key: GEMINI_REASONING_MODEL
        value: gemini-2.0-flash

      - key: GEMINI_JD_PARSE_MODEL
        value: gemini-2.0-flash

      - key: GEMINI_CHAT_MODEL
        value: gemini-2.0-flash

      - key: OPENAI_REASONING_MODEL
        value: gpt-4o-mini

      - key: OPENAI_JD_PARSE_MODEL
        value: gpt-4o

      - key: OPENAI_CHAT_MODEL
        value: gpt-4o-mini

      # Fallback behavior
      - key: API_FALLBACK_ENABLED
        value: "true"

      # CORS — set to your Vercel frontend URL after deployment
      # e.g. https://ai-jd.vercel.app
      - key: ALLOWED_ORIGIN
        value: "*"                   # Tighten this to your Vercel URL in production
