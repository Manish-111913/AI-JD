name: Deploy — Frontend (Vercel) & Backend (Render)

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Cancel in-progress runs on new push to the same branch
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Deploy Frontend to Vercel
# Triggers on any change under FRONTEND/
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    # Only run if FRONTEND files changed
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect FRONTEND changes
        id: frontend_changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep '^FRONTEND/' | wc -l)
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        if: steps.frontend_changes.outputs.changed > 0 || github.event_name == 'push'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: FRONTEND/package-lock.json

      - name: Install Vercel CLI
        if: steps.frontend_changes.outputs.changed > 0 || github.event_name == 'push'
        run: npm install --global vercel@latest

      - name: Pull Vercel environment info
        if: steps.frontend_changes.outputs.changed > 0 || github.event_name == 'push'
        working-directory: FRONTEND
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build project artifacts
        if: steps.frontend_changes.outputs.changed > 0 || github.event_name == 'push'
        working-directory: FRONTEND
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel production
        if: steps.frontend_changes.outputs.changed > 0 || github.event_name == 'push'
        working-directory: FRONTEND
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Deploy Backend to Render
# Render auto-deploys via webhook on push; this job calls the deploy hook
# so you can see it in the Actions log.
# ─────────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Render
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect BACKEND changes
        id: backend_changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep '^BACKEND/' | wc -l)
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      - name: Trigger Render deploy webhook
        if: steps.backend_changes.outputs.changed > 0 || github.event_name == 'push'
        run: |
          echo "Triggering Render deployment..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            --request POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          echo "Render response: $RESPONSE"
          if [ "$RESPONSE" -lt 200 ] || [ "$RESPONSE" -ge 300 ]; then
            echo "ERROR: Render deploy hook returned HTTP $RESPONSE"
            exit 1
          fi
          echo "✅ Render deployment triggered successfully."
